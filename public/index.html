    <body onload="loadBooksIntoTable()">
        <h1>Knihobudka Čtyřkoly</h1>
        <div>
            <form id="addBookForm">
                <div class="form-row">
                    Přijmení autora: 
                    <input type="text" name="authorSurname" id="authorSurname" required>
                    Jméno autora:

        </div>
<h1>📚 Book Barcode Scanner</h1>

<div id="videoContainer">
<video id="video" autoplay muted playsinline></video>
<div id="scanBox"></div>
</div>

<canvas id="canvas"></canvas>

<div>
<button onclick="startScanner()">Start Scanner</button>
<button onclick="toggleTorch()">🔦 Flashlight</button>
</div>

<div>
<input type="file" id="imageInput" accept="image/*" />
</div>

<div id="status">Waiting for scan...</div>

<h2>Scanned Books</h2>
<div id="results"></div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13]);
const codeReader = new ZXing.BrowserMultiFormatReader(hints);

const video=document.getElementById('video');
const status=document.getElementById('status');
const results=document.getElementById('results');
const imageInput=document.getElementById('imageInput');

let currentStream=null;
let torch=false;
let scanned=new Set();

function isBookBarcode(code){
 return code.startsWith('978')||code.startsWith('979');
}

async function fetchBook(isbn){
 try{
  const res=await fetch(`https://openlibrary.org/isbn/${isbn}.json`);
  if(!res.ok) throw new Error();

  const data=await res.json();

  let author="";

  if(data.authors&&data.authors.length>0){
   const a=await fetch(`https://openlibrary.org${data.authors[0].key}.json`);
   const ad=await a.json();
   author=ad.name;
  }

  const cover=`https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`;

  addBook({
   title:data.title,
   author,
   isbn,
   cover
  });

 }catch{
  addBook({
   title:"Unknown Book",
   author:"",
   isbn,
   cover:""
  });
 }
}

function addBook(book){
 if(scanned.has(book.isbn)) return;
 scanned.add(book.isbn);

 const div=document.createElement('div');
 div.className='book';

 const img=document.createElement('img');
 img.src=book.cover||"";

 const info=document.createElement('div');
 info.className='bookInfo';

 const title=document.createElement('div');
 title.textContent=book.title;

 const author=document.createElement('div');
 author.textContent=book.author;

 const isbn=document.createElement('div');
 isbn.className='isbn';
 isbn.textContent=book.isbn;

 info.appendChild(title);
 info.appendChild(author);
 info.appendChild(isbn);

 div.appendChild(img);
 div.appendChild(info);

 results.prepend(div);
}

async function startScanner(){
 status.textContent="Starting camera...";

 try{

  const stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:{ideal:'environment'},focusMode:'continuous'}
  });

  currentStream=stream;
  video.srcObject=stream;

  const track=stream.getVideoTracks()[0];

  const capabilities=track.getCapabilities();

  if(capabilities.focusMode){
   try{
    await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
   }catch{}
  }

  codeReader.decodeFromVideoElement(video,(result,err)=>{

   if(result){

    const code=result.text;

    if(isBookBarcode(code)){
     status.textContent="ISBN detected";
     fetchBook(code);
    }else{
     status.textContent="Not a book barcode";
    }

   }

  });

 }catch(err){
  status.textContent="Camera error: "+err;
 }
}

async function toggleTorch(){
 if(!currentStream) return;

 const track=currentStream.getVideoTracks()[0];
 const cap=track.getCapabilities();

 if(!cap.torch){
  status.textContent="Torch not supported";
  return;
 }

 torch=!torch;

 try{
  await track.applyConstraints({advanced:[{torch}]});
 }catch(e){
  status.textContent="Torch error";
 }
}

imageInput.addEventListener('change',async e=>{

 const file=e.target.files[0];
 if(!file) return;

 const img=new Image();
 img.src=URL.createObjectURL(file);

 img.onload=async()=>{

  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');

  canvas.width=img.width;
  canvas.height=img.height;

  ctx.drawImage(img,0,0);

  try{

   const result=await codeReader.decodeFromCanvas(canvas);

   const code=result.text;

   if(isBookBarcode(code)){
    fetchBook(code);
    status.textContent="Book detected from image";
   }else{
    status.textContent="Not a book barcode";
   }

  }catch{
   status.textContent="No barcode found";
  }
 }
});

</script>

        <script src="index.js"></script>
        <script>
            const baseURL = 'https://knihobudka-online-production.up.railway.app';
            async function loadBooksIntoTable() {
                const table = document.getElementById('table');
                try {
                    const response = await fetch(baseURL+'/api/books/show', {
                        method: 'GET',
                        headers: {
                            "Content-Type": 'application/json'
                        }
                    });
                    const currentBooks = await response.json();
                    if (!currentBooks || currentBooks.length === 0) {
                        alert('V knihobudce momentálně nejsou žádné knihy.');
                        return;
                    }
                    currentBooks.forEach(book => {
                        const row = table.insertRow();
                        row.id = book.bookId;
                        const cellSurname = row.insertCell(0);
                        const cellName = row.insertCell(1);
                        const cellTitle = row.insertCell(2);
                        const cellYear = row.insertCell(3);
                        const cellIsbn = row.insertCell(4);
                        const cellDelete = row.insertCell(5);

                        cellSurname.textContent = book.surname;
                        cellName.textContent = book.name;
                        cellTitle.textContent = book.title;
                        cellYear.textContent = book.year;
                        cellIsbn.textContent = book.isbn;
                        cellDelete.innerHTML = `<button class="editButton" onclick="editRow(this)">Upravit</button><button onclick="deleteBook(this)">Odstranit</button>`;
                    });

                } catch (error) {
                    // Handle any errors that occurred during the fetch
                    console.error('Error loading books:', error);
                    table.innerHTML = '<tr><td colspan="5">Načítaní knih z databáze bylo neúspěšné. Prosím, zkuste to později.</td></tr>';
                }
            }
            async function addBook() {
                var table = document.getElementById("table");
                var bookForm = document.getElementById("addBookForm")
                var surname = bookForm.elements["authorSurname"].value;
                var name = bookForm.elements["authorFirstName"].value;
                var title = bookForm.elements["title"].value; 
                var yearPublished = bookForm.elements["yearPublished"].value;
                var isbn = bookForm.elements["isbn"].value;
                
                if (isValidISBN(isbn) == false) { //Calls a function, which returns, whether the ISBN provided is valid
                        alert('ISBN není validní');
                        return}
                
                if (!title || !surname || !name || !yearPublished) { // If any of the fields are empty, try to fetch book data using the provided ISBN
                    const getBook = await fetch(baseURL+`/api/books/isbn?isbn=${isbn}`)
                    book = await getBook.json();
                    console.log(book);
                    if (!book.name) { //Handles the cases of a single named author, where the API returns the name in the surname field and leaves the name field empty
                        book.name = "";
                    }
                    if (!book.surname) {
                        book.surname = book.name;
                        book.name = "";
                    }
                    surname = book.surname;
                    name = book.name;
                    title = book.title;
                    yearPublished = book.yearPublished;
                    if (!title || !surname || !name || !yearPublished) {
                        alert('Přidání knihy podle ISBN se nezdařilo. Zkontrolujte prosím zadané ISBN nebo vyplňte všechna pole ručně.');
                        return}}
                try {
                    var row = table.insertRow(-1);
                    var bookSurname = row.insertCell(0);
                    var bookName = row.insertCell(1);
                    var bookTitle = row.insertCell(2);
                    var datePublished = row.insertCell(3);
                    var bookIsbn = row.insertCell(4);
                    var deleteBook = row.insertCell(5);
                    deleteBook.innerHTML = `<button class="editButton" onclick="editRow(this)">Upravit</button><button onclick="deleteBook(this)">Odstranit</button>`;
                    bookSurname.innerHTML = surname;
                    bookName.innerHTML = name;
                    bookTitle.innerHTML = title;
                    datePublished.innerHTML = yearPublished;
                    bookIsbn.innerHTML = isbn;
                    const response = await fetch(baseURL+"/api/books/add", {
                        method: 'POST',
                        headers: {
                            "Content-Type": 'application/json'
                        },
                        body: JSON.stringify({
                            surname: surname,
                            name: name,
                            title: title,
                            year: yearPublished,
                            isbn: isbn
                        })
                    })
                    const newItem = await response.json();
                    row.id = newItem.bookId
                    document.getElementById("addBookForm").reset();
                } catch (error) {
                    alert('Chyba při přidávání knihy. Zkuste to prosím znovu.');
                    console.error('Error adding book:', error);
            }};
            async function deleteBook(button) {
                var row = button.parentNode.parentNode;
                const id = row.getAttribute('id');
                row.parentNode.removeChild(row);
                const res = await fetch(baseURL, {
                    method: 'DELETE',
                    headers: {
                        "Content-Type": 'application/json'
                    },
                    body: JSON.stringify({
                        id: id,
                    })
                })
            }
            function editRow(button) {
                const row = button.parentNode.parentNode;
                const bookId = row.id;
                for (let i = 0; i < 5; i++) {
                    const cell = row.cells[i];
                    const currentValue = cell.textContent;
                    cell.innerHTML = `<input type="text" value="${currentValue}">`;
                }
                const actionsCell = row.cells[5];
                actionsCell.innerHTML = `
                    <button class="saveButton" onclick="saveChanges(this)">Uložit</button>
                    <button id="deleteButton" onclick="deleteBook(this)">Odstranit</button>
                `;}
            async function saveChanges(button) {
                const row = button.parentNode.parentNode;
                const bookId = row.id;
                // Get values from input fields
                const updatedData = {
                    surname: row.cells[0].querySelector('input').value,
                    name: row.cells[1].querySelector('input').value,
                    title: row.cells[2].querySelector('input').value,
                    year: row.cells[3].querySelector('input').value,
                    isbn: row.cells[4].querySelector('input').value
                };
                try {
                    // Send update to server
                    const response = await fetch(baseURL + "/api/books/update", {
                        method: 'PUT',
                        headers: {
                            "Content-Type": 'application/json'
                        },
                        body: JSON.stringify({
                            id: bookId,
                            ...updatedData
                        })
                    });
                    
                    if (response.ok) {
                        // Update table cells with new values
                        for (let i = 0; i < 5; i++) {
                            const cell = row.cells[i];
                            cell.textContent = updatedData[Object.keys(updatedData)[i]];
                        }
                        
                        // Restore edit and delete buttons
                        const actionsCell = row.cells[5];
                        actionsCell.innerHTML = `
                            <button class="editButton" onclick="editRow(this)">Upravit</button>
                            <button onclick="deleteBook(this)">Odstranit</button>
                        `;
                    } else {
                        throw new Error('Failed to update book');
                    }
                } catch (error) {
                    alert('Chyba při ukládání změn. Zkuste to prosím znovu.');
                    console.error('Error saving changes:', error);
                    cancelEditing(button);
                }
            }
            function searchBooks(query) {
                const table = document.getElementById('table');
                const rows = table.getElementsByTagName('tr');
                const lowerCaseQuery = query.toLowerCase();
                
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].getElementsByTagName('td');
                    let rowContainsQuery = false;
                    
                    for (let j = 0; j < cells.length - 1; j++) {
                        const cellText = cells[j].textContent.toLowerCase();
                        if (cellText.includes(lowerCaseQuery)) {
                            rowContainsQuery = true;
                            break;
                        }
                    }
                    
                    if (rowContainsQuery) {
                        rows[i].style.display = '';
                    } else {
                        rows[i].style.display = 'none';
                    }
                }
            }
        </script>
